name: dbt CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dbt-ci:
    name: dbt Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: netflix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        working-directory: .
        run: pip install dbt-snowflake==1.8.4

      - name: Write profiles.yml
        working-directory: .
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          netflix:
            target: ${{ github.event_name == 'push' && 'prod' || 'ci' }}
            outputs:
              ci:
                type: snowflake
                account: DDAJCJE-LK83464
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: Transform
                database: MOVIELENS
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                schema: ci_pr_${{ github.event.pull_request.number }}
                threads: 4
              prod:
                type: snowflake
                account: DDAJCJE-LK83464
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: Transform
                database: MOVIELENS
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                schema: marts
                threads: 4
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: dbt debug
        run: dbt debug

      - name: dbt build (compile + run + test)
        run: dbt build --fail-fast

      - name: dbt docs generate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dbt docs generate

      - name: Upload docs as Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: netflix/target

  deploy-docs:
    name: Deploy dbt Docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: dbt-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
